# ─── SSPD Frontend — Nginx Reverse Proxy ─────────────────────────────────────
#
# Setup (Option A — recommended, no CORS needed):
#   1. Build frontend:  cd src/main/resources/ui && npm run build:standalone
#   2. Copy dist/ to /var/www/sspd/ (or any path below)
#   3. Start backend WAR on port 8080 as usual
#   4. Place this file in /etc/nginx/conf.d/sspd.conf  (or sites-enabled/)
#   5. sudo nginx -t && sudo systemctl reload nginx
#
# Because Nginx proxies /api/ and /ws-clinic/ to the backend, the browser
# sees everything on port 80 (same origin) — no CORS configuration needed.
# .env.standalone must have VITE_BACKEND_PORT=80 so API calls go through Nginx.

server {
    listen 80;
    server_name 192.168.20.248;          # change to your LAN IP or hostname

    root /var/www/sspd;                  # path to your dist/ output
    index index.html;

    # ── REST API ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8080/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── WebSocket (SockJS / STOMP) ────────────────────────────────────────────
    location /ws-clinic/ {
        proxy_pass             http://127.0.0.1:8080/ws-clinic/;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_read_timeout     3600s;
    }

    # ── SPA (HashRouter — all routes resolve to index.html) ──────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ─────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

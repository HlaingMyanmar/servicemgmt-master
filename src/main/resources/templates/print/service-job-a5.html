<!--
  ══════════════════════════════════════════════════════════════════════════
  SERVICE VOUCHER (Intake Sheet) — A5

  Identical structure to service-job-a4.html; A5 sizing via print-base.css.

  Customise this document type by editing:
    • Intake Sheet sections → fragments/service-job-body.html  ← main body here
    • Bill To / Invoice     → fragments/invoice-info-blocks.html
    • Service lines + Parts → fragments/invoice-table.html
    • Signatures / Footer   → fragments/invoice-footer.html :: last
  ══════════════════════════════════════════════════════════════════════════
-->
<div class="invoice-page invoice-page--a5" xmlns:th="http://www.thymeleaf.org">

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <div th:if="${inv.currentPage == 1}"
       th:replace="~{print/fragments/invoice-header :: full(${inv}, ${layout})}"></div>
  <div th:if="${inv.currentPage > 1}"
       th:replace="~{print/fragments/invoice-header :: cont(${inv}, ${layout})}"></div>

  <!-- ── Body ───────────────────────────────────────────────────────────── -->
  <div class="inv-body">

    <!-- Bill To + Invoice Details (first page) -->
    <div th:if="${inv.currentPage == 1}"
         th:replace="~{print/fragments/invoice-info-blocks :: render(${inv})}"></div>

    <!-- Intake Sheet: Device · Problem · Condition checklist (first page) -->
    <div th:if="${inv.currentPage == 1}"
         th:replace="~{print/fragments/service-job-body :: render(${inv})}"></div>

    <!-- Service lines + Parts table (all pages) -->
    <div th:replace="~{print/fragments/service-job-table :: render(${inv})}"></div>

    <!-- No financial summary — intake form, not a payment receipt -->

    <!-- Last page: remark + signatures + footer bar -->
    <div th:if="${inv.currentPage == inv.totalPages}"
         th:replace="~{print/fragments/invoice-footer :: last(${inv})}"></div>

    <!-- Non-last pages: "continued" footer -->
    <div th:if="${inv.currentPage < inv.totalPages}"
         th:replace="~{print/fragments/invoice-footer :: cont(${inv})}"></div>

  </div>

</div>
